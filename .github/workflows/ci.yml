name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      # Dependency-free: syntax-checks every .mjs and parses every .json.
      - name: Lint (mjs syntax + json validity)
        run: npm run lint

  selftest:
    # The discriminator self-test: proves the scorer orders a worse UI below a better
    # one. Pure + deterministic (no network/Chrome/agent), so it gates every PR. NOTE:
    # this proves the FORMULA discriminates, not the full pipeline — the end-to-end
    # discriminator (real Lighthouse + vision-judge on a served page) is operator-run.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Discriminator self-test
        run: npm run selftest

  tools-install:
    # Proves the pinned harness manifest installs reproducibly on a clean runner from
    # the committed lockfile. We skip postinstall scripts so Playwright does NOT download
    # a browser here — the browser is only needed by the operator-run end-to-end loop,
    # which adds its own `npx playwright install --with-deps chromium` at that time.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Install harness dependencies (from lockfile)
        working-directory: tools
        run: npm ci --ignore-scripts --no-audit --no-fund
